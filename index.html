<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Landing Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            background: #000;
        }

        nav h1 {
            color: #00ffcc;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.08), transparent 55%);
            pointer-events: none;
        }

        .form-card {
            position: relative;
            width: 100%;
            max-width: 700px;
            background: rgba(20, 20, 20, 0.95);
            padding: 40px 38px;
            border-radius: 24px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .form-card h2 {
            margin-bottom: 10px;
            font-size: 2.3rem;
            color: #00ffcc;
            letter-spacing: 0.4px;
        }

        .form-card p {
            color: #b8c1cc;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d9e0;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #2b2b2b;
            border-radius: 12px;
            background: #111;
            color: #f1f5f9;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 0 4px rgba(0, 255, 204, 0.12);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .btn {
            width: 100%;
            padding: 16px 18px;
            background: #00ffcc;
            color: #000;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(0, 255, 204, 0.15);
        }

        @media (max-width: 720px) {
            nav {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }

            .hero {
                padding: 30px 16px;
            }

            .hero h2 {
                font-size: 2.8rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav>
        <h1 style="font-style: italic;">ADMISSION FORM</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="form-card">
            <h2>Academy Admission Form</h2>
            <p>Fill in your details below to register for the next batch. All fields are required to help us process
                your admission quickly.</p>
            <form action="profile.html" method="get">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="father-name">Father's Name</label>
                        <input type="text" id="father-name" name="father-name" placeholder="Father's name" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="qualification">Qualification</label>
                        <input type="text" id="qualification" name="qualification" placeholder="Highest qualification"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" min="10" max="100" placeholder="Your age" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="batch">Batch</label>
                        <select id="batch" name="batch" required>
                            <option value="">Select batch</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="contact">Contact Number</label>
                        <input type="tel" id="contact" name="contact" placeholder="123-456-7890" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" placeholder="Your full address" required></textarea>
                </div>

                <button type="submit" class="btn">Submit</button>
            </form>
        </div>
    </section>

</body>

</html>
